source = ~/.config/hypr/colors.conf


# ── Monitors ──────────────────────────────────────────────────────────────────
monitor = eDP-1, 1920x1080@144, 0x0, 1
monitor = , preferred, auto, auto


# ── Variables ─────────────────────────────────────────────────────────────────
$terminal    = kitty
$fileManager = dolphin
$menu        = qs --path ~/.config/quickshell/launcher.qml
$scripts     = ~/.config/hypr/scripts
$quickshell  = ~/.config/quickshell
$mainMod     = SUPER


# ── Autostart ─────────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start xdg-desktop-portal
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = swaync
exec-once = swww init
exec-once = swww-daemon
exec-once = sleep 1 && swww img ~/.config/hypr/current_wallpaper --transition-type fade --transition-duration 1.5
exec-once = hyprctl setcursor Adwaita 24
exec-once = sleep 2 && QML_XHR_ALLOW_FILE_READ=1 quickshell --path ~/.config/quickshell/shell.qml


# ── Environment ───────────────────────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,          nvidia
env = GBM_BACKEND,                nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,  nvidia
env = WLR_NO_HARDWARE_CURSORS,    1
env = GDK_BACKEND,                wayland,x11
env = QT_QPA_PLATFORM,            wayland;xcb
env = WLR_DRM_NO_ATOMIC,          1
env = __GL_GSYNC_ALLOWED,         0


# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout = tr
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }
}


# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in          = 5
    gaps_out         = 8
    border_size      = 2
    col.active_border   = $primary
    col.inactive_border = $surface_container
    layout           = dwindle
    resize_on_border = true
}


# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
    rounding         = 14
    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled              = true
        size                 = 8
        passes               = 3
        vibrancy             = 0.15
        vibrancy_darkness    = 0.3
        noise                = 0.008
        contrast             = 0.9
        brightness           = 0.9
        popups               = true
        popups_ignorealpha   = 0.3
    }

    shadow {
        enabled        = true
        range          = 30
        render_power   = 3
        color          = rgba(00000055)
        color_inactive = rgba(00000030)
        offset         = 0, 4
    }
}


# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = pureflow, 0.22, 1.2, 0.36, 1
    bezier = purein,   0.4,  0,   0.2,  1
    bezier = pureout,  0.6,  0,   1,    1

    animation = windows,          1, 3, pureflow, popin 80%
    animation = windowsOut,       1, 2, pureout,  popin 80%
    animation = windowsMove,      1, 3, pureflow
    animation = border,           1, 5, purein
    animation = borderangle,      1, 5, purein,   once
    animation = fadeIn,           1, 2, purein
    animation = fadeOut,          1, 2, pureout
    animation = workspaces,       1, 3, pureflow, slidefadevert 20%
    animation = specialWorkspace, 1, 3, pureflow, slidefadevert 30%
    animation = layers,           1, 2, pureflow, fade
}


# ── Layouts ───────────────────────────────────────────────────────────────────
dwindle {
    force_split             = 0
    special_scale_factor    = 0.8
    split_width_multiplier  = 1.0
    use_active_for_splits   = true
    pseudotile              = yes
    preserve_split          = yes
}


# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo        = true
    force_default_wallpaper      = 0
    vrr                          = 1
    animate_manual_resizes       = true
    animate_mouse_windowdragging = true
    focus_on_activate            = true
}

# ── Window Rules ──────────────────────────────────────────────────────────────
windowrule   = suppressevent maximize, class:.*
windowrulev2 = float,           class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float,           class:^(blueman-manager)$
windowrulev2 = opacity 0.9 0.8, class:^(dolphin)$


# ── Keybinds ──────────────────────────────────────────────────────────────────
bind = $mainMod,       RETURN, exec,    $terminal
bind = $mainMod,       D,      exec,    $menu
bind = $mainMod,       W,      exec,    firefox
bind = $mainMod SHIFT, RETURN, exec,    $fileManager
bind = $mainMod SHIFT, Q,      killactive
bind = $mainMod,       L,      exec,    hyprlock
bind = $mainMod,       C,      exec,    swaync-client -t
bind = $mainMod SHIFT, A,      exec,    bash $quickshell/wall/wall.sh
bind = $mainMod,       F,      exec,    bash $scripts/toggle-float.sh
bind = $mainMod,       TAB,    cyclenext
bind = $mainMod,       Print,  exec,    grim -g "$(slurp)" - | swappy -f -

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

bind = $mainMod, mouse_up,   layoutmsg, swapwithmaster
bind = $mainMod, mouse_down, layoutmsg, focusmaster

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
