# #######################################################################################
# HYPRLAND CONFIG (SMOOTH + SLIDEVERT + ROFI GLASS)
# #######################################################################################

source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/animations/caelestia.conf

################
### MONITORS ###
################
monitor = ,preferred,auto,auto
monitor = eDP-1,1920x1080@144,0x0,1


###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun


#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start xdg-desktop-portal
exec-once = systemctl --user start xdg-desktop-portal-wlr
exec-once = nm-applet
exec-once = blueman-applet
exec-once = waybar
exec-once = swaync
exec-once = hyprpaper
exec-once = walker --gapplication-service


#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

env = GDK_BACKEND,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# NVIDIA
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# cursor
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
exec-once = hyprctl setcursor Adwaita 24

# qt
env = QT_QPA_PLATFORMTHEME,qt5ct

# GTK 
env = GDK_BACKEND,wayland
env = CLUTTER_BACKEND,wayland
env = GNOME_SHELL_SESSION_MODE,classic
env = GNOME_DESKTOP_SESSION_ID,this-is-not-gnome

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = $primary

    resize_on_border = false
    layout = master
}

decoration {
    rounding = 0


    blur {
        enabled = true
        size = 7
        passes = 3
        vibrancy = 0.17
        new_optimizations = true
    }
}



###################
### GESTURES ###
###################
gestures {
    workspace_swipe_direction_lock = true
    workspace_swipe_invert = false
gesture = 3, horizontal, workspace
}


###################
### LAYOUTS ###
###################
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    mfact = 0.55
    orientation = left
    inherit_fullscreen = true
}



###################
### MISC ###
###################
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = -1
    vrr = 1
}


#############
### INPUT ###
#############
input {
    kb_layout = tr
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}


###################
### KEYBINDS ###
###################
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, F, togglefloating
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, W, exec, firefox
bind = $mainMod SHIFT, return, exec, $fileManager
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, C, exec, swaync-client -t
bind = $mainMod SHIFT, A, exec, bash ~/.config/hypr/Scripts/wppicker.sh
bind = $mainMod SHIFT, W, exec, bash ~/.config/hypr/Scripts/waybar.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, TAB,  cyclenext

bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot-$(date +%F_%H-%M-%S).png && swappy -f ~/Pictures/Screenshots/screenshot-$(date +%F_%H-%M-%S).png

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

###################
### ROFI RULES ###
###################
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = animation slide, rofi


###################
### WINDOW RULES ###
###################
windowrule = suppressevent maximize, class:.*
windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
